<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ઓફલાઇન - સાવિત્રી માર્ટ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Poppins", "Noto Sans Gujarati", sans-serif;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 16px;
        }
        
        p {
            color: #7f8c8d;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
        }
        
        .contact-info {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        
        .contact-info a {
            color: #2ecc71;
            text-decoration: none;
        }
        
        @media (max-width: 600px) {
            .offline-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>તમારું કનેક્શન ઓફલાઇન છે</h1>
        <p>કૃપા કરીને તમારું ઇન્ટરનેટ કનેક્શન તપાસો અને ફરી પ્રયાસ કરો. ઓફલાઇન હોય ત્યારે કેટલીક સુવિધાઓ મર્યાદિત હોઈ શકે છે.</p>
        <button class="retry-btn" onclick="location.reload()">
            ફરી પ્રયાસ કરો
        </button>
        <div class="contact-info">
            <p>તાત્કાલિક સહાયની જરૂર છે?</p>
            <p>અમને કૉલ કરો: <a href="tel:+919427020201">+૯૧ ૯૪૨૭૦૨૦૨૦૧</a></p>
            <p>વોટ્સએપ: <a href="https://wa.me/919427020201">સંદેશ મોકલો</a></p>
        </div>
    </div>
</body>
</html>
